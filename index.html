<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir MotoRoute Planner</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            /* High-quality cinematic view of İzmir Gulf/Kordon as background */
            background: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1590757363901-383796851d7c?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .moto-accent {
            color: #f59e0b; /* Amber 500 */
        }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4);
        }

        .result-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        select option {
            background-color: #1e293b;
            color: white;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card max-w-md w-full rounded-3xl p-8 shadow-2xl my-8 border border-white/5">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight uppercase">
                MotoRoute <span class="moto-accent">İzmir</span>
            </h1>
            <p class="text-slate-300 text-sm mt-2 font-medium tracking-wide">Find your perfect riding route in İzmir</p>
        </header>

        <div class="space-y-5">
            <!-- Documents -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">1. License & Documents</label>
                <select id="D" class="w-full bg-slate-900/60 border border-slate-700/50 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all cursor-pointer">
                    <option value="Clear">All Documents Clear</option>
                    <option value="Missing">Missing Documents</option>
                </select>
            </div>

            <!-- Bike Type -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">2. Motorcycle Type</label>
                <select id="T" class="w-full bg-slate-900/60 border border-slate-700/50 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all cursor-pointer">
                    <option value="Racing">Racing</option>
                    <option value="Touring">Touring</option>
                    <option value="Enduro">Enduro</option>
                    <option value="Scooter">Scooter</option>
                </select>
            </div>

            <!-- Riding Style -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">3. Preferred Style</label>
                <select id="S" class="w-full bg-slate-900/60 border border-slate-700/50 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all cursor-pointer">
                    <option value="Aggressive">Aggressive</option>
                    <option value="Chill">Chill</option>
                    <option value="Sightseeing">Sightseeing</option>
                    <option value="Long Way">Long Way</option>
                </select>
            </div>

            <!-- Engine CC -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">4. Engine Capacity</label>
                <select id="C" class="w-full bg-slate-900/60 border border-slate-700/50 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all cursor-pointer">
                    <option value="0-250">0 - 250cc</option>
                    <option value="251-599">251 - 599cc</option>
                    <option value="600+">600cc and above</option>
                </select>
            </div>

            <!-- Road Preference -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">5. Road Environment</label>
                <select id="R" class="w-full bg-slate-900/60 border border-slate-700/50 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all cursor-pointer">
                    <option value="Highway">Highway</option>
                    <option value="Off-road">Off-road</option>
                    <option value="Curvy">Curvy</option>
                    <option value="Scenic">Scenic View</option>
                </select>
            </div>

            <button onclick="calculateRoute()" class="btn-primary w-full py-4 rounded-xl text-slate-900 font-extrabold text-sm uppercase tracking-widest mt-4 shadow-xl active:scale-95 transition-transform">
                Plan My Ride
            </button>
        </div>

        <div id="result-container" class="mt-8 hidden">
            <div id="result-box" class="p-6 rounded-2xl border-l-4">
                <h3 id="result-title" class="text-xl font-extrabold mb-1"></h3>
                <p id="result-desc" class="text-sm opacity-95 mb-4 leading-relaxed"></p>
                <div class="pt-3 border-t border-white/10">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Logic Pattern Match</p>
                    <span id="logic-tag" class="text-[10px] font-mono text-amber-400"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateRoute() {
            const d = document.getElementById('D').value;
            const t = document.getElementById('T').value;
            const s = document.getElementById('S').value;
            const c = document.getElementById('C').value;
            const r = document.getElementById('R').value;

            const container = document.getElementById('result-container');
            const box = document.getElementById('result-box');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            const tag = document.getElementById('logic-tag');

            let resTitle = "";
            let resDesc = "";
            let resType = "success"; 

            // LOGIC IMPLEMENTATION
            if (d === "Missing") {
                resTitle = "Izmir Ülkü Park";
                resDesc = "Condition Detected: Missing Documents. Safety first! Public roads are not legally permitted for your current status. We recommend the professional closed track in Pınarbaşı for a safe and adrenaline-filled experience.";
                resType = "warning";
            }
            else if ((t === "Racing" || t === "Scooter") && r === "Off-road") {
                resTitle = "Vehicle Mismatch Error";
                resDesc = "Warning: Physical limitation detected. Racing bikes and Scooters are not equipped for off-road terrains like forest trails or loose dirt. Please select a compatible road type.";
                resType = "error";
            }
            else if (s === "Aggressive" && r === "Highway") {
                resTitle = "Kuzey Ege Highway";
                resDesc = "The perfect choice for high-speed stability and wide lanes. This corridor offers the best asphalt quality for aggressive power delivery.";
            }
            else if (s === "Long Way" && c === "600+" && r === "Highway") {
                resTitle = "Efes - Meryem Ana Route";
                resDesc = "A premium tour for high-capacity machines. A fast highway run followed by technical, scenic bends climbing up to the historic House of Virgin Mary.";
            }
            else if (s === "Long Way" && (c === "0-250" || c === "251-599") && r === "Scenic") {
                resTitle = "İzmir - Foça Route";
                resDesc = "The quintessential coastal journey. A steady, enjoyable pace along the north coast with plenty of scenic stops.";
            }
            else if (s === "Long Way" && c === "0-250" && r === "Highway") {
                resTitle = "Foça Highway Connection";
                resDesc = "Strategic highway links optimized for smaller engines to maintain visibility and safety while heading towards the northern coast.";
            }
            else if (r === "Scenic" && s === "Chill" && c === "0-250") {
                resTitle = "Kordon to Güzelbahçe Road";
                resDesc = "A classic city-coast cruise. Feel the sea breeze of the Gulf as you ride from the city center to the western coastline.";
            }
            else if (r === "Scenic" && t === "Scooter" && s === "Sightseeing") {
                resTitle = "İnciraltı City Forest";
                resDesc = "The ideal scooter getaway. Quiet roads, green surroundings, and direct access to the sea-side forest paths.";
            }
            else if (r === "Scenic" && s === "Sightseeing" && c === "0-250") {
                resTitle = "Sasalı Bird Paradise";
                resDesc = "A flat and peaceful route through the wildlife sanctuary. Perfect for low-speed cruising and nature photography.";
            }
            else if (r === "Scenic" && t === "Touring" && s === "Sightseeing") {
                resTitle = "Sığacık - Seferihisar Route";
                resDesc = "Touring comfort meets scenic beauty. A beautiful ride leading to the famous 'Cittaslow' harbor of Sığacık.";
            }
            else if (r === "Curvy" && t === "Racing" && s === "Aggressive") {
                resTitle = "Karaburun Bends";
                resDesc = "The ultimate test of precision. These technical curves on the peninsula are the favorite for sportbike enthusiasts.";
            }
            else if (r === "Curvy" && s === "Sightseeing") {
                resTitle = "Varyant - Konak Curves";
                resDesc = "Short, technical, and iconic. These historic curves offer one of the best panoramic views of the İzmir Clock Tower and bay.";
            }
            else if (r === "Curvy" && t === "Enduro" && s === "Aggressive") {
                resTitle = "Yaka Köy - Çiçekli Forest Road";
                resDesc = "Tight, technical asphalt winding through the forest. High adrenaline for riders who love technical handling.";
            }
            else if (r === "Curvy") {
                resTitle = "Sabuncubeli Pass";
                resDesc = "A classic mountain pass between İzmir and Manisa. Wide rhythmic curves and significant elevation changes.";
            }
            else if (r === "Off-road" && (t === "Enduro" || t === "Touring")) {
                resTitle = "Homeros Valley - Dirt Paths";
                resDesc = "True adventure terrain. Dirt trails and unpaved paths designed for dual-sport capabilities and nature exploration.";
            }
            else {
                resTitle = "İzmir Coastal Explorer";
                resDesc = "A general purpose route through the bay area, balanced for your current engine capacity and riding style.";
            }

            // Display Logic
            title.innerText = resTitle;
            desc.innerText = resDesc;
            tag.innerText = `${d} | ${t} | ${S.value} | ${c} | ${r}`;
            
            container.classList.remove('hidden');
            container.classList.add('result-fade-in');

            if (resType === "error") {
                box.className = "p-6 rounded-2xl border-l-4 bg-red-900/50 border-red-500 text-red-50 shadow-2xl";
            } else if (resType === "warning") {
                box.className = "p-6 rounded-2xl border-l-4 bg-amber-900/50 border-amber-500 text-amber-50 shadow-2xl";
            } else {
                box.className = "p-6 rounded-2xl border-l-4 bg-emerald-900/50 border-emerald-500 text-emerald-50 shadow-2xl";
            }

            setTimeout(() => container.classList.remove('result-fade-in'), 600);
        }
    </script>
</body>
</html>
