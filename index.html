<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmir MotoRoute - Visual Planner</title>
    <style>
        :root {
            --primary: #f39c12;
            --overlay: rgba(0, 0, 0, 0.85);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            /* Arka Plan: İzmir Genel Manzara */
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('https://images.pexels.com/photos/15206533/pexels-photo-15206533.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .app-container {
            background: rgba(25, 25, 25, 0.95);
            max-width: 600px;
            width: 100%;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            border: 1px solid var(--primary);
            backdrop-filter: blur(8px);
        }

        h1 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin-top: 0; }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full { grid-column: span 2; }
        
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #bbb; font-weight: bold; }
        select { width: 100%; padding: 12px; border-radius: 6px; background: #222; color: white; border: 1px solid #444; outline: none; }
        select:focus { border-color: var(--primary); }

        button {
            width: 100%; padding: 16px; margin-top: 25px;
            background: var(--primary); color: black; border: none;
            border-radius: 8px; font-weight: 800; font-size: 16px; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }

        button:hover { background: #e67e22; transform: scale(1.02); }

        /* Sonuç Alanı */
        #result-box {
            margin-top: 30px; padding: 25px; border-radius: 15px;
            background: #111; display: none; text-align: center;
            border: 1px solid #333; animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #route-image {
            width: 100%; height: 280px; object-fit: cover;
            border-radius: 12px; margin-bottom: 20px;
            border: 2px solid var(--primary);
        }

        .route-title { color: var(--primary); font-size: 24px; font-weight: bold; margin-bottom: 12px; }
        .route-desc { color: #ddd; font-size: 15px; line-height: 1.6; margin: 0; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>MotoRoute İzmir</h1>
    
    <div class="grid-inputs">
        <div class="full">
            <label>Missing Documents?</label>
            <select id="docs">
                <option value="no">No, everything is okay</option>
                <option value="yes">Yes, I have missing documents</option>
            </select>
        </div>
        <div>
            <label>Motorcycle Type</label>
            <select id="type">
                <option value="Racing">Racing</option>
                <option value="Naked">Naked</option>
                <option value="Enduro">Enduro</option>
                <option value="Touring">Touring</option>
                <option value="Scooter">Scooter</option>
            </select>
        </div>
        <div>
            <label>Riding Style</label>
            <select id="style">
                <option value="Aggresive">Aggressive</option>
                <option value="Chill">Chill</option>
                <option value="Sightseeing">Sightseeing</option>
                <option value="Long way">Long way</option>
            </select>
        </div>
        <div>
            <label>Engine CC</label>
            <select id="cc">
                <option value="0-250cc">0-250cc</option>
                <option value="251-599cc">251-599cc</option>
                <option value="600+">600cc & Above</option>
            </select>
        </div>
        <div>
            <label>Road Type</label>
            <select id="road">
                <option value="Highway">Highway</option>
                <option value="Off-road">Off-road</option>
                <option value="Curvy">Curvy</option>
                <option value="View">View</option>
            </select>
        </div>
    </div>

    <button onclick="getRoute()">GENERATE ROUTE</button>

    <div id="result-box">
        <img id="route-image" src="" alt="Route Recommendation">
        <div id="route-title" class="route-title"></div>
        <p id="route-description" class="route-desc"></p>
    </div>
</div>

<script>
    function getRoute() {
        const docs = document.getElementById('docs').value;
        const type = document.getElementById('type').value;
        const road = document.getElementById('road').value;
        const cc = document.getElementById('cc').value;
        const style = document.getElementById('style').value;

        const box = document.getElementById('result-box');
        const img = document.getElementById('route-image');
        const title = document.getElementById('route-title');
        const desc = document.getElementById('route-description');

        let rName, rDesc, rImg;

        // --- UPDATED LOCAL LOGIC MATRIX ---
        if (docs === 'yes') {
            rName = "Ülkü Race Track (Pınarbaşı)";
            rDesc = "Safety First! Since you have missing documents, stay on the professional track in Pınarbaşı for legal riding.";
            rImg = "https://images.pexels.com/photos/163789/race-car-race-track-speedway-auto-racing-163789.jpeg"; 
        } 
        else if (road === 'Highway' && cc === '600+' && style === 'Aggresive') {
            rName = "Kuzey Ege Highway";
            rDesc = "Perfect for high-CC engines to test their limits. Wide lanes and smooth asphalt for a focused speed run.";
            rImg = "https://images.pexels.com/photos/2583471/pexels-photo-2583471.jpeg";
        }
        else if (type === 'Enduro' && road === 'Off-road') {
            rName = "Balçova Therapy Forest";
            rDesc = "Hardcore technical trails inside the city forest. Best for experienced Enduro riders.";
            rImg = "https://images.pexels.com/photos/1038935/pexels-photo-1038935.jpeg";
        }
        else if (road === 'Off-road') {
            rName = "Homeros Valley (Bornova)";
            rDesc = "Explore the dirt paths of Bornova. Great for light off-road and nature lovers.";
            rImg = "https://images.pexels.com/photos/914804/pexels-photo-914804.jpeg";
        }
        else if (road === 'Curvy' && (type === 'Racing' || type === 'Naked' || cc === '600+')) {
            rName = "Sabuncubeli Curves / Karaburun Curvy Road";
            rDesc = "Technical bends and leaning points. Whether it's the old Manisa road or the peninsula, enjoy the curves!";
            rImg = "https://images.pexels.com/photos/1546901/pexels-photo-1546901.jpeg";
        }
        else if (style === 'Long way' && road === 'View') {
            rName = "İzmir Center to Foça Marina";
            rDesc = "A beautiful long-distance cruise. Scenic views leading to the historical Foça port.";
            rImg = "https://images.pexels.com/photos/2361601/pexels-photo-2361601.jpeg";
        }
        else if (type === 'Scooter' && style === 'Chill') {
            rName = "İnciraltı Coastline";
            rDesc = "The perfect escape within the city. Relaxed ride and easy breeze.";
            rImg = "https://images.pexels.com/photos/3405001/pexels-photo-3405001.jpeg";
        }
        else {
            // "Bay Loop" yerine senin belirttiğin Kordon - Güzelbahçe hattı
            rName = "Alsancak Kordon - Güzelbahçe Coastline";
            rDesc = "A legendary ride along İzmir's coastline. Pass through Kordon, Göztepe, and Narlıdere all the way to Güzelbahçe.";
            rImg = "https://images.pexels.com/photos/15206533/pexels-photo-15206533.jpeg";
        }

        // DOM Update
        title.innerText = rName;
        desc.innerText = rDesc;
        img.src = rImg;
        box.style.display = "block";
        
        // Otomatik kaydır (Sonuca odaklanmak için)
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
