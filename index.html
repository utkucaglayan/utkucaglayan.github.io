<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir MotoRoute Planner</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .moto-accent {
            color: #f59e0b; /* Amber 500 */
        }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4);
        }

        .result-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card max-w-md w-full rounded-3xl p-8 shadow-2xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight uppercase">
                MotoRoute <span class="moto-accent">İzmir</span>
            </h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Find your perfect riding route in İzmir</p>
        </header>

        <div class="space-y-5">
            <!-- Documents -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">1. License & Documents</label>
                <select id="D" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all">
                    <option value="Clear">All Documents Clear</option>
                    <option value="Missing">Missing Documents</option>
                </select>
            </div>

            <!-- Bike Type -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">2. Motorcycle Type</label>
                <select id="T" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all">
                    <option value="Racing">Racing</option>
                    <option value="Touring">Touring</option>
                    <option value="Enduro">Enduro</option>
                    <option value="Scooter">Scooter</option>
                </select>
            </div>

            <!-- Riding Style -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">3. Preferred Style</label>
                <select id="S" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all">
                    <option value="Aggressive">Aggressive</option>
                    <option value="Chill">Chill</option>
                    <option value="Sightseeing">Sightseeing</option>
                    <option value="Long Way">Long Way</option>
                </select>
            </div>

            <!-- Engine CC -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">4. Engine Capacity</label>
                <select id="C" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all">
                    <option value="0-250">0 - 250cc</option>
                    <option value="251-599">251 - 599cc</option>
                    <option value="600+">600cc and above</option>
                </select>
            </div>

            <!-- Road Preference -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">5. Road Environment</label>
                <select id="R" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all">
                    <option value="Highway">Highway</option>
                    <option value="Off-road">Off-road</option>
                    <option value="Curvy">Curvy</option>
                    <option value="Scenic">Scenic View</option>
                </select>
            </div>

            <button onclick="calculateRoute()" class="btn-primary w-full py-4 rounded-xl text-black font-extrabold text-sm uppercase tracking-widest mt-4">
                Plan My Ride
            </button>
        </div>

        <div id="result-container" class="mt-8 hidden">
            <div id="result-box" class="p-6 rounded-2xl border-l-4">
                <h3 id="result-title" class="text-xl font-extrabold mb-1"></h3>
                <p id="result-desc" class="text-sm opacity-90 mb-3"></p>
                <div class="pt-3 border-t border-white/10">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Logic Pattern Match</p>
                    <span id="logic-tag" class="text-[10px] font-mono text-amber-500"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateRoute() {
            const d = document.getElementById('D').value;
            const t = document.getElementById('T').value;
            const s = document.getElementById('S').value;
            const c = document.getElementById('C').value;
            const r = document.getElementById('R').value;

            const container = document.getElementById('result-container');
            const box = document.getElementById('result-box');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            const tag = document.getElementById('logic-tag');

            let resTitle = "";
            let resDesc = "";
            let resType = "success"; // success, warning, error

            // LOGIC IMPLEMENTATION
            // 1. Legal Priority Check
            if (d === "Missing") {
                resTitle = "Izmir Ülkü Park";
                resDesc = "Condition Detected: Missing Documents. You should not use public roads. Enjoy the professional, closed track environment in Pınarbaşı for legal and safe riding.";
                resType = "warning";
            }
            // 2. Compatibility Priority Check
            else if ((t === "Racing" || t === "Scooter") && r === "Off-road") {
                resTitle = "Vehicle Mismatch Error";
                resDesc = "Warning: Racing bikes and Scooters are not physically equipped for off-road terrains like forest trails or dirt paths.";
                resType = "error";
            }
            // 3. Routing Matrix
            else if (s === "Aggressive" && r === "Highway") {
                resTitle = "Kuzey Ege Highway";
                resDesc = "Optimized for high-speed stability and wide asphalt lanes. Great for clearing your mind on long straights.";
            }
            else if (s === "Long Way" && c === "600+" && r === "Highway") {
                resTitle = "Efes - Meryem Ana Route";
                resDesc = "A premium long-distance tour. Enjoy the power on the highway followed by the iconic winding climb to the House of the Virgin Mary.";
            }
            else if (s === "Long Way" && (c === "0-250" || c === "251-599") && r === "Scenic") {
                resTitle = "İzmir - Foça Route";
                resDesc = "A beautiful coastal journey. Steady pace and great views along the northern shore.";
            }
            else if (s === "Long Way" && c === "0-250" && r === "Highway") {
                resTitle = "Foça Highway Connection";
                resDesc = "Specifically selected safe highway links that offer the best visibility for lower capacity engines heading north.";
            }
            else if (r === "Scenic" && s === "Chill" && c === "0-250") {
                resTitle = "Kordon to Güzelbahçe Road";
                resDesc = "A relaxing coastal cruise through the heart of the city. Perfect for a breezy weekend ride.";
            }
            else if (r === "Scenic" && t === "Scooter" && s === "Sightseeing") {
                resTitle = "İnciraltı City Forest";
                resDesc = "An accessible green escape. Easily navigable with a scooter and offers great shoreline views.";
            }
            else if (r === "Scenic" && s === "Sightseeing" && c === "0-250") {
                resTitle = "Sasalı Bird Paradise";
                resDesc = "Ride through the peaceful nature reserve paths. A flat, calm road for nature lovers.";
            }
            else if (r === "Scenic" && t === "Touring" && s === "Sightseeing") {
                resTitle = "Sığacık - Seferihisar Route";
                resDesc = "Designed for touring comfort. A scenic journey ending at the historic Cittaslow harbor.";
            }
            else if (r === "Curvy" && t === "Racing" && s === "Aggressive") {
                resTitle = "Karaburun Bends";
                resDesc = "Technical, sharp turns that demand high concentration. The gold standard for technical riding in İzmir.";
            }
            else if (r === "Curvy" && s === "Sightseeing") {
                resTitle = "Varyant - Konak Curves";
                resDesc = "Iconic short curves overlooking the city and the Gulf. Great for a quick sightseeing session.";
            }
            else if (r === "Curvy" && t === "Enduro" && s === "Aggressive") {
                resTitle = "Yaka Köy - Çiçekli Forest Road";
                resDesc = "Technical asphalt through narrow forest passes. Excellent for enduro handling on tarmac.";
            }
            else if (r === "Curvy") {
                resTitle = "Sabuncubeli Pass";
                resDesc = "The classic mountain pass connecting İzmir and Manisa. Steep climbs and rhythmic curves.";
            }
            else if (r === "Off-road" && (t === "Enduro" || t === "Touring")) {
                resTitle = "Homeros Valley - Dirt Paths";
                resDesc = "Adventure-ready dirt paths. Ideal for dual-sport bikes and riders seeking natural terrain.";
            }
            else {
                resTitle = "İzmir Perimeter Route";
                resDesc = "A balanced journey through İzmir's main arteries, adjusted for your current motorcycle profile.";
            }

            // UI Display
            title.innerText = resTitle;
            desc.innerText = resDesc;
            tag.innerText = `${d} | ${t} | ${s} | ${c}cc | ${r}`;
            
            container.classList.remove('hidden');
            container.classList.add('result-fade-in');

            if (resType === "error") {
                box.className = "p-6 rounded-2xl border-l-4 bg-red-900/20 border-red-500 text-red-200";
            } else if (resType === "warning") {
                box.className = "p-6 rounded-2xl border-l-4 bg-amber-900/20 border-amber-500 text-amber-200";
            } else {
                box.className = "p-6 rounded-2xl border-l-4 bg-emerald-900/20 border-emerald-500 text-emerald-200";
            }

            setTimeout(() => container.classList.remove('result-fade-in'), 500);
        }
    </script>
</body>
</html>
