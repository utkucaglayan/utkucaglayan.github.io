<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmir MotoRoute - Strict Logic Planner</title>
    <style>
        :root { --primary: #f39c12; --danger: #e74c3c; --bg-overlay: rgba(0, 0, 0, 0.85); }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.pexels.com/photos/15206533/pexels-photo-15206533.jpeg') no-repeat center center fixed;
            background-size: cover; color: white; margin: 0; display: flex; justify-content: center; padding: 20px;
        }
        .app-card {
            background: rgba(20, 20, 20, 0.95); max-width: 600px; width: 100%; padding: 30px;
            border-radius: 15px; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; border-radius: 5px; background: #333; color: white; border: 1px solid #444; }
        button {
            width: 100%; padding: 15px; margin-top: 20px; background: var(--primary); 
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        #result-box { margin-top: 25px; padding: 20px; border-radius: 10px; background: #111; display: none; text-align: center; border: 1px solid #333; }
        #route-img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; border: 1px solid var(--primary); margin-bottom: 15px; }
        .success-title { color: var(--primary); font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .error-title { color: var(--danger); font-size: 22px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>MotoRoute İzmir</h1>
    <div class="inputs">
        <div class="full">
            <label>Missing Documents?</label>
            <select id="docs"><option value="no">No</option><option value="yes">Yes</option></select>
        </div>
        <div>
            <label>Motorcycle Type</label>
            <select id="type">
                <option value="Racing">Racing</option><option value="Naked">Naked</option>
                <option value="Enduro">Enduro</option><option value="Touring">Touring</option><option value="Scooter">Scooter</option>
            </select>
        </div>
        <div>
            <label>Riding Style</label>
            <select id="style">
                <option value="Aggresive">Aggressive</option><option value="Chill">Chill</option>
                <option value="Sightseeing">Sightseeing</option><option value="Long way">Long way</option>
            </select>
        </div>
        <div>
            <label>Engine CC</label>
            <select id="cc"><option value="0-250cc">0-250cc</option><option value="251-599cc">251-599cc</option><option value="600+">600cc+</option></select>
        </div>
        <div>
            <label>Road Type</label>
            <select id="road"><option value="Highway">Highway</option><option value="Off-road">Off-road</option><option value="Curvy">Curvy</option><option value="View">View</option></select>
        </div>
    </div>

    <button onclick="calculateRoute()">PLAN MY ROUTE</button>

    <div id="result-box">
        <img id="route-img" src="" alt="Preview">
        <div id="route-title" class="success-title"></div>
        <p id="route-desc"></p>
    </div>
</div>

<script>
    function calculateRoute() {
        const docs = document.getElementById('docs').value;
        const type = document.getElementById('type').value;
        const style = document.getElementById('style').value;
        const road = document.getElementById('road').value;
        const cc = document.getElementById('cc').value;
        
        const box = document.getElementById('result-box');
        const img = document.getElementById('route-img');
        const title = document.getElementById('route-title');
        const desc = document.getElementById('route-desc');

        box.style.display = "block";

        // --- 1. ÖNCELİK: GÜVENLİK KAPISI ---
        if (docs === 'yes') {
            title.innerText = "Ülkü Race Track (Pınarbaşı)";
            title.className = "success-title";
            desc.innerText = "Safety Alert: Documents missing. Keep your adrenaline on the legal track.";
            img.src = "https://images.pexels.com/photos/163789/race-car-race-track-speedway-auto-racing-163789.jpeg";
            return;
        }

        // --- 2. ÖNCELİK: MANTIKSAL KISITLAMA (CONSTRAINT) ---
        // Bu blok, yanlış motor-yol eşleşmelerini diğer tüm koşullardan önce yakalar.
        if ((type === 'Racing' || type === 'Scooter' || type === 'Touring') && road === 'Off-road') {
            title.innerText = "Incompatible Match!";
            title.className = "error-title";
            desc.innerText = "Logic Error: A " + type + " bike cannot handle Off-road conditions. Please change your road type to Highway or Curvy.";
            img.src = "https://images.pexels.com/photos/4064527/pexels-photo-4064527.jpeg";
            return;
        }

        // Başlık stilini normale döndür (Eğer daha önce hata verdiyse diye)
        title.className = "success-title";

        // --- 3. ANA ROTA MANTIĞI ---
        if (style === 'Aggresive' && road === 'Highway' && cc === '600+') {
            title.innerText = "Kuzey Ege Highway";
            desc.innerText = "High speed and aggressive riding on the best asphalt in the North.";
            img.src = "https://images.pexels.com/photos/2583471/pexels-photo-2583471.jpeg";
        }
        else if (style === 'Aggresive' && road === 'Curvy') {
            title.innerText = "Sabuncubeli Curves";
            desc.innerText = "Tight cornering for aggressive riders. Experience the old Manisa road curves.";
            img.src = "https://images.pexels.com/photos/1546901/pexels-photo-1546901.jpeg";
        }
        else if (style === 'Sightseeing' && road === 'Curvy') {
            title.innerText = "Karaburun Curvy Road";
            desc.innerText = "Legendary curves with a view. Perfect for sightseeing at a technical pace.";
            img.src = "https://images.pexels.com/photos/15194512/pexels-photo-15194512.jpeg";
        }
        else if (type === 'Enduro' && road === 'Off-road') {
            title.innerText = "Balçova Therapy Forest";
            desc.innerText = "Professional Enduro trails. Mud, rocks, and technical climbs.";
            img.src = "https://images.pexels.com/photos/1038935/pexels-photo-1038935.jpeg";
        }
        else if (style === 'Long way' && road === 'View') {
            title.innerText = "İzmir Center to Foça Marina";
            desc.innerText = "A long-distance coastal cruise for a peaceful journey.";
            img.src = "https://images.pexels.com/photos/2361601/pexels-photo-2361601.jpeg";
        }
        else if (style === 'Chill' || type === 'Scooter') {
            title.innerText = "İnciraltı Coastline";
            desc.innerText = "A relaxed evening cruise by the sea. Perfect for light riding.";
            img.src = "https://images.pexels.com/photos/3405001/pexels-photo-3405001.jpeg";
        }
        else {
            title.innerText = "Alsancak Kordon - Güzelbahçe Coast";
            desc.innerText = "Explore the heart of İzmir's coastline at your own pace.";
            img.src = "https://images.pexels.com/photos/15206533/pexels-photo-15206533.jpeg";
        }
    }
</script>

</body>
</html>
