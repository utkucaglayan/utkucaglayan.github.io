<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir MotoRoute Planner</title>
    <!-- Tailwind CSS: Modern and responsive UI framework -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
        }

        /* Fixed Background Image: Izmir view with gradient overlay */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.85)), 
                              url('https://www.eglengez.com/wp-content/uploads/2024/09/Izmirde-Gezilecek-Yerler-e1726472587489.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Glassmorphism card effect */
        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .moto-accent {
            color: #f59e0b; /* Amber 500 */
        }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4);
        }

        .result-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        select option {
            background-color: #1e293b;
            color: white;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .weather-shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-overlay"></div>

    <div class="glass-card max-w-md w-full rounded-3xl p-8 shadow-2xl my-8 border border-white/5 text-slate-100">
        
        <!-- Live Weather Section -->
        <div id="weather-container" class="mb-6 p-4 rounded-2xl bg-black/20 border border-white/5 overflow-hidden relative">
            <div id="weather-loading" class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-white/10 animate-pulse"></div>
                <div class="space-y-2">
                    <div class="w-24 h-3 bg-white/10 rounded animate-pulse"></div>
                    <div class="w-16 h-2 bg-white/5 rounded animate-pulse"></div>
                </div>
            </div>
            <div id="weather-content" class="hidden flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span id="weather-icon" class="text-3xl">☀️</span>
                    <div>
                        <p id="weather-temp" class="text-xl font-bold">--°C</p>
                        <p id="weather-status" class="text-[10px] uppercase tracking-widest text-slate-400">Loading Weather...</p>
                    </div>
                </div>
                <div class="text-right">
                    <span id="weather-safety" class="text-[9px] font-black uppercase px-2 py-1 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500/20">Checking...</span>
                </div>
            </div>
        </div>

        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight uppercase">
                MotoRoute <span class="moto-accent">İzmir</span>
            </h1>
            <p class="text-slate-300 text-sm mt-2 font-medium tracking-wide">Find your perfect riding route in İzmir</p>
        </header>

        <div class="space-y-5">
            <!-- Documents (D) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">1. Documents Missing?</label>
                <select id="D" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="DN">No</option>
                    <option value="DY">Yes</option>
                </select>
            </div>

            <!-- Bike Type (T) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">2. Motorcycle Type</label>
                <select id="T" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="TR">Racing</option>
                    <option value="TT">Touring</option>
                    <option value="TS">Scooter</option>
                    <option value="TE">Enduro</option>
                </select>
            </div>

            <!-- Style (S) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">3. Riding Style</label>
                <select id="S" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="SA">Aggressive</option>
                    <option value="SK">Chill</option>
                    <option value="SG">Sightseeing</option>
                    <option value="SW">Long Way</option>
                </select>
            </div>

            <!-- Engine CC (C) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">4. Engine Capacity</label>
                <select id="C" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="C1">0 - 250cc</option>
                    <option value="C2">251 - 599cc</option>
                    <option value="C3">600cc and above</option>
                </select>
            </div>

            <!-- Road Type (R) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">5. Road Environment</label>
                <select id="R" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="RH">Highway</option>
                    <option value="RO">Off-road</option>
                    <option value="RC">Curvy</option>
                    <option value="RS">Scenic View</option>
                </select>
            </div>

            <button onclick="calculateRoute()" class="btn-primary w-full py-4 rounded-xl text-slate-900 font-extrabold text-sm uppercase tracking-widest mt-4 shadow-xl active:scale-95 transition-transform">
                Generate Recommendation
            </button>
        </div>

        <!-- Result Section -->
        <div id="result-container" class="mt-8 hidden">
            <div id="result-box" class="p-6 rounded-2xl border-l-4 overflow-hidden bg-white/5 border-white/10">
                <div class="flex flex-col gap-4">
                    <div id="result-img-container" class="w-full h-64 rounded-xl overflow-hidden shadow-lg border border-white/10 hidden">
                        <img id="result-img" src="" alt="Destination" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h3 id="result-title" class="text-xl font-extrabold mb-1"></h3>
                        <p id="result-desc" class="text-sm opacity-95 mb-4 leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // Set by runtime

        // Route Images Mapping
        const destinationImages = {
            "Ülkü Park Race Track": "https://www.gundemcesme.com/haber_resim/Ulku-Park-Pistinde-Nefes-Kesen-Mucadele--107691.jpg",
            "Kuzey Ege Highway": "https://kalyonholding.com/images/yatirim-isletme.webp",
            "Efes Meryem Ana": "https://habereksprescomtr.teimg.com/haberekspres-com-tr/uploads/2024/04/image-208db99d0a1ead25aaf46f55d8006df4a5001a1e.png",
            "İzmir Foça Route": "https://trthaberstatic.cdn.wp.trt.com.tr/resimler/2236000/foca-izmir-a-2237981.jpg",
            "Foça Highway Connection": "https://egetelgrafcom.teimg.com/crop/1280x720/egetelgraf-com/wp/uploads/2020/08/foca-tuzmine-otoyol-dopingi.jpg",
            "Kordon to Güzelbahçe": "https://egetelgrafcom.teimg.com/egetelgraf-com/uploads/2025/08/4-307.jpg",
            "Inciralti City Forest": "https://avatars.mds.yandex.net/get-searchnews-images/13860241/2a0000019786d8214d022e59956baa0c1ac1/orig",
            "Sasalı Bird Paradise": "https://www.sinasiyuksel.com/blog/wp-content/gallery/kus-cenneti-2017/IMG_6631.JPG",
            "Sığacık Seferihisar": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/S%C4%B1%C4%9Fac%C4%B1k_02.jpg/960px-S%C4%B1%C4%9Fac%C4%B1k_02.jpg",
            "Karaburun Bends": "https://cdn.villacim.com.tr/uploads/3840/294_izmirkaraburungezilecekyerler.jpg",
            "Varyant Konak": "https://izgazetenet.teimg.com/izgazete-net/uploads/2025/04/birlesmis-milletler-caddesi-varyant-3.jpg",
            "Yaka Köy Çiçekli": "https://izgazetenet.teimg.com/izgazete-net/uploads/2024/12/koy-iz-kapak.jpg",
            "Sabuncubeli Pass": "https://manisahaberlericom.teimg.com/manisahaberleri-com/images/upload/AW414348_07.jpg",
            "Homeros Valley": "https://1.bp.blogspot.com/-FUoCADHP1f0/VpBNHCCh_oI/AAAAAAAACD4/4AU_itGFwK4/s1600/Homeros-Vadisi.jpg",
            "İzmir Coastal Highway": "https://egetelgrafcom.teimg.com/egetelgraf-com/uploads/2025/03/selway-outlet-avm.webp"
        };

        /**
         * Fetch current weather in Izmir using Gemini API with Google Search grounding
         */
        async function getLiveWeather(retries = 0) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = "What is the current weather in İzmir, Turkey right now? Return a JSON object with: temperature (number), condition (string), icon_emoji (string), and is_safe_for_motorcycling (boolean). Short and accurate.";

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                const weather = JSON.parse(data.candidates[0].content.parts[0].text);
                
                updateWeatherUI(weather);
            } catch (error) {
                if (retries < 5) {
                    const delay = Math.pow(2, retries) * 1000;
                    setTimeout(() => getLiveWeather(retries + 1), delay);
                } else {
                    document.getElementById('weather-status').innerText = "Weather unavailable";
                }
            }
        }

        function updateWeatherUI(w) {
            document.getElementById('weather-loading').classList.add('hidden');
            document.getElementById('weather-content').classList.remove('hidden');
            
            document.getElementById('weather-temp').innerText = `${w.temperature}°C`;
            document.getElementById('weather-status').innerText = w.condition;
            document.getElementById('weather-icon').innerText = w.icon_emoji;
            
            const safety = document.getElementById('weather-safety');
            if (w.is_safe_for_motorcycling) {
                safety.innerText = "Safe to Ride";
                safety.className = "text-[9px] font-black uppercase px-2 py-1 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500/20";
            } else {
                safety.innerText = "Caution Advised";
                safety.className = "text-[9px] font-black uppercase px-2 py-1 rounded bg-red-500/20 text-red-400 border border-red-500/20";
            }
        }

        // Init weather on load
        window.onload = function() {
            getLiveWeather();
        };

        /**
         * Logic Matrix Calculation
         */
        function calculateRoute() {
            const d = document.getElementById('D').value; 
            const t = document.getElementById('T').value; 
            const s = document.getElementById('S').value; 
            const c = document.getElementById('C').value; 
            const r = document.getElementById('R').value; 

            const container = document.getElementById('result-container');
            const box = document.getElementById('result-box');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            const resultImg = document.getElementById('result-img');
            const resultImgContainer = document.getElementById('result-img-container');

            let resTitle = "";
            let resDesc = "";
            let resType = "success"; 

            // Logic Matrix Implementation
            
            // 1. Legal Priority: Documents Missing
            if (d === "DY") {
                resTitle = "Ülkü Park Race Track";
                resDesc = "Documents are missing. Public roads are restricted for your safety. We recommend the professional closed circuit at Ülkü Park in Pınarbaşı.";
                resType = "warning";
            }
            // 2. Compatibility Priority: Bike vs Terrain
            else if ((t === "TR" || t === "TS") && r === "RO") {
                resTitle = "Mismatch Error";
                resDesc = "Safety Warning: Racing bikes and Scooters are not physically built for mountain trails or loose dirt paths. Please select a paved road type.";
                resType = "error";
            }
            // 3. Routing Scenarios
            else if (s === "SA" && r === "RH") {
                resTitle = "Kuzey Ege Highway";
                resDesc = "Perfect for high-speed stability and wide asphalt lanes. Optimized for aggressive engine performance.";
            }
            else if (s === "SW" && c === "C3" && r === "RH") {
                resTitle = "Efes Meryem Ana";
                resDesc = "A premium long-distance tour for high-power machines. Fast highway journey followed by iconic bends.";
            }
            else if (s === "SW" && (c === "C1" || c === "C2") && r === "RS") {
                resTitle = "İzmir Foça Route";
                resDesc = "The classic coastal journey. A steady pace along the northern coastline with great sea views.";
            }
            else if (s === "SW" && c === "C1" && r === "RH") {
                resTitle = "Foça Highway Connection";
                resDesc = "Safe highway links selected specifically for smaller engines to maintain visibility while heading north.";
            }
            else if (r === "RS" && s === "SK" && c === "C1") {
                resTitle = "Kordon to Güzelbahçe";
                resDesc = "A relaxing cruise along the bay. Perfect for enjoying the sea breeze at a low pace.";
            }
            else if (r === "RS" && t === "TS" && s === "SG") {
                resTitle = "Inciralti City Forest";
                resDesc = "Ideal scooter getaway. Peaceful green forest paths right by the city's western shoreline.";
            }
            else if (r === "RS" && s === "SG" && c === "C1") {
                resTitle = "Sasalı Bird Paradise";
                resDesc = "Flat and calm route through the wildlife preserve. Perfect for nature lovers and bird watching.";
            }
            else if (r === "RS" && t === "TT" && s === "SG") {
                resTitle = "Sığacık Seferihisar";
                resDesc = "Comfortable touring combined with scenic history. Leads to the beautiful historic Cittaslow harbor.";
            }
            else if (r === "RC" && t === "TR" && s === "SA") {
                resTitle = "Karaburun Bends";
                resDesc = "High concentration required. These technical, sharp turns are the gold standard for sport riders in Izmir.";
            }
            else if (r === "RC" && s === "SG") {
                resTitle = "Varyant Konak";
                resDesc = "Iconic short curves overlooking the historical heart of the city and the Gulf of Izmir.";
            }
            else if (r === "RC" && t === "TE" && s === "SA") {
                resTitle = "Yaka Köy Çiçekli";
                resDesc = "Technical asphalt through narrow forest passes. Excellent terrain for testing enduro handling on tarmac.";
            }
            else if (r === "RC") {
                resTitle = "Sabuncubeli Pass";
                resDesc = "The classic mountain climb connecting İzmir and Manisa. Features rhythmic curves and altitude changes.";
            }
            else if (r === "RO" && (t === "TE" || t === "TT")) {
                resTitle = "Homeros Valley";
                resDesc = "True adventure paths. Unpaved trails designed for dual-sport capabilities and exploration.";
            }
            else {
                resTitle = "İzmir Coastal Highway";
                resDesc = "A general balanced journey through the city's arteries, adjusted for your profile.";
            }

            // UI Display
            title.innerText = resTitle;
            desc.innerText = resDesc;

            const imgUrl = destinationImages[resTitle];
            if (imgUrl) {
                resultImg.src = imgUrl;
                resultImgContainer.classList.remove('hidden');
            } else {
                resultImgContainer.classList.add('hidden');
            }
            
            container.classList.remove('hidden');
            container.classList.add('result-fade-in');

            // Apply conditional styling
            if (resType === "error") {
                box.className = "p-6 rounded-2xl border-l-4 bg-red-900/50 border-red-500 text-red-100 shadow-2xl";
            } else if (resType === "warning") {
                box.className = "p-6 rounded-2xl border-l-4 bg-amber-900/50 border-amber-500 text-amber-100 shadow-2xl";
            } else {
                box.className = "p-6 rounded-2xl border-l-4 bg-emerald-900/50 border-emerald-500 text-emerald-50 shadow-2xl";
            }

            setTimeout(() => container.classList.remove('result-fade-in'), 600);
        }
    </script>
</body>
</html>
