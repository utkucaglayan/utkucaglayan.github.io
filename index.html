<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buluşma Mekanı Bulucu</title>
    <style>
        /* Genel Eğlenceli ve Okunaklı Tasarım (18-65 yaş için uygun) */
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7f9fc;
            --text-color: #2d3436;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 28px;
        }

        p.subtitle {
            color: #636e72;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Adımları gizleme/gösterme sınıfları */
        .step {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Eğlenceli ve Büyük Butonlar */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(78, 205, 196, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            background-color: #45b7af;
        }

        button:active {
            transform: translateY(1px);
        }

        /* Sonuç Ekranı Stilleri */
        .result-box {
            background-color: #fff0f0;
            border: 3px dashed var(--primary-color);
            border-radius: 20px;
            padding: 30px 20px;
            margin: 20px 0 30px 0;
        }

        #result-text {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
        }

        .restart-btn {
            background-color: #636e72;
            box-shadow: 0 4px 6px rgba(99, 110, 114, 0.2);
        }

        .restart-btn:hover {
            background-color: #2d3436;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>💖 Buluşma Mekanı Bulucu</h1>
        <p class="subtitle">Sizin için en mükemmel buluşma noktasını bulalım!</p>

        <!-- Adım 1: Bütçe Seçimi -->
        <div id="step-1" class="step active">
            <h2>Bütçe seviyeniz nedir?</h2>
            <div class="btn-group">
                <button onclick="selectBudget('H')">💸 Yüksek Bütçe</button>
                <button onclick="selectBudget('M')">💵 Orta Bütçe</button>
                <button onclick="selectBudget('L')">🪙 Düşük Bütçe</button>
            </div>
        </div>

        <!-- Adım 2: Atmosfer Seçimi -->
        <div id="step-2" class="step">
            <h2>Nasıl bir atmosfer tercih edersiniz?</h2>
            <div class="btn-group">
                <button onclick="selectAtmosphere('R')">🌹 Romantik</button>
                <button onclick="selectAtmosphere('F')">🎉 Eğlenceli</button>
                <button onclick="selectAtmosphere('C')">☕ Sakin</button>
                <button onclick="selectAtmosphere('A')">🏕️ Maceracı</button>
            </div>
        </div>

        <!-- Adım 3: Sonuç Ekranı -->
        <div id="step-3" class="step">
            <h2>Sizin İçin Harika Bir Önerimiz Var!</h2>
            <div class="result-box">
                <p id="result-text">Sonuç Yükleniyor...</p>
            </div>
            <button class="restart-btn" onclick="restartApp()">🔄 Yeniden Başla</button>
        </div>
    </div>

    <script>
        // Kullanıcı seçimlerini tutacak değişkenler
        let selectedBudget = '';
        let selectedAtmosphere = '';

        // PDF'deki mantık matrisi
        const recommendationMatrix = {
            'H': { // Yüksek Bütçe
                'R': 'Lüks Restoran (Fine Dining)',
                'F': 'Gece Kulübü',
                'C': 'Sahil Restoranı',
                'A': 'Lüks Seyahat'
            },
            'M': { // Orta Bütçe
                'R': 'Kafe',
                'F': 'Sinema',
                'C': 'Tiyatro',
                'A': 'Dağ Gezisi'
            },
            'L': { // Düşük Bütçe
                'R': 'Piknik',
                'F': 'Evde Yemek Pişirme',
                'C': 'Parkta Yürüyüş',
                'A': 'Orman Gezisi'
            }
        };

        // Bütçe seçildiğinde çalışacak fonksiyon
        function selectBudget(budget) {
            selectedBudget = budget;
            // 1. adımı gizle, 2. adımı göster
            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.active = true;
            document.getElementById('step-2').classList.add('active');
        }

        // Atmosfer seçildiğinde çalışacak fonksiyon
        function selectAtmosphere(atmosphere) {
            selectedAtmosphere = atmosphere;
            
            // Sonucu hesapla
            calculateResult();

            // 2. adımı gizle, 3. adımı (sonuç) göster
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-3').classList.add('active');
        }

        // Seçimlere göre sonucu bulan ve ekrana yazdıran fonksiyon
        function calculateResult() {
            const result = recommendationMatrix[selectedBudget][selectedAtmosphere];
            document.getElementById('result-text').innerText = result;
        }

        // Uygulamayı sıfırlayan fonksiyon
        function restartApp() {
            selectedBudget = '';
            selectedAtmosphere = '';
            
            // Sonuç ekranını gizle, 1. adımı göster
            document.getElementById('step-3').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
        }
    </script>
</body>
</html>
