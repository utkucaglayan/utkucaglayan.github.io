<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir MotoRoute Planner</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
        }

        /* Sabit Arka Plan: İzmir Saat Kulesi */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.85)), 
                              url('https://images.unsplash.com/photo-1541432901912-2d8362758590?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .moto-accent {
            color: #f59e0b; /* Amber 500 */
        }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4);
        }

        .result-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        select option {
            background-color: #1e293b;
            color: white;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-overlay"></div>

    <div class="glass-card max-w-md w-full rounded-3xl p-8 shadow-2xl my-8 border border-white/5 text-slate-100">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight uppercase">
                MotoRoute <span class="moto-accent">İzmir</span>
            </h1>
            <p class="text-slate-300 text-sm mt-2 font-medium tracking-wide">Find your perfect riding route in İzmir</p>
        </header>

        <div class="space-y-5">
            <!-- Documents (D) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">1. Documents Missing? (Y/N)</label>
                <select id="D" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="DN">No (N)</option>
                    <option value="DY">Yes (Y)</option>
                </select>
            </div>

            <!-- Bike Type (T) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">2. Motorcycle Type (R/T/S/E)</label>
                <select id="T" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="TR">Racing (R)</option>
                    <option value="TT">Touring (T)</option>
                    <option value="TS">Scooter (S)</option>
                    <option value="TE">Enduro (E)</option>
                </select>
            </div>

            <!-- Style (S) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">3. Riding Style (A/W/G/K)</label>
                <select id="S" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="SA">Aggressive (A)</option>
                    <option value="SC">Chill (W)</option>
                    <option value="SW">Long Way (G)</option>
                    <option value="SV">Sightseeing (K)</option>
                </select>
            </div>

            <!-- Engine CC (C) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">4. Engine Capacity (1/2/3)</label>
                <select id="C" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="C1">0 - 250cc (1)</option>
                    <option value="C2">251 - 599cc (2)</option>
                    <option value="C3">600cc and above (3)</option>
                </select>
            </div>

            <!-- Road Type (R) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">5. Road Environment (H/O/C/V)</label>
                <select id="R" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="RH">Highway (H)</option>
                    <option value="RO">Off-road (O)</option>
                    <option value="RC">Curvy (C)</option>
                    <option value="RS">Scenic View (V)</option>
                </select>
            </div>

            <button onclick="calculateRoute()" class="btn-primary w-full py-4 rounded-xl text-slate-900 font-extrabold text-sm uppercase tracking-widest mt-4 shadow-xl active:scale-95 transition-transform">
                Generate Recommendation
            </button>
        </div>

        <!-- Result Container -->
        <div id="result-container" class="mt-8 hidden">
            <div id="result-box" class="p-6 rounded-2xl border-l-4">
                <h3 id="result-title" class="text-xl font-extrabold mb-1"></h3>
                <p id="result-desc" class="text-sm opacity-95 mb-4 leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        /**
         * Logic Matrix for Izmir MotoRoute Planner
         * Mapping symbols from image_ecaada.png to local values.
         */
        function calculateRoute() {
            const d = document.getElementById('D').value; // DY, DN
            const t = document.getElementById('T').value; // TR, TT, TS, TE
            const s = document.getElementById('S').value; // SA, SC, SW, SV
            const c = document.getElementById('C').value; // C1, C2, C3
            const r = document.getElementById('R').value; // RH, RO, RC, RS

            const container = document.getElementById('result-container');
            const box = document.getElementById('result-box');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');

            let resTitle = "";
            let resDesc = "";
            let resType = "success"; 

            // --- LOGIC STRINGS FROM IMAGE_ECAADA.PNG ---
            
            // 1. (Y) -> UP
            if (d === "DY") {
                resTitle = "Izmir Ülkü Park";
                resDesc = "Görsel Mantığı (Y): Belgeler eksik olduğunda güvenlik için profesyonel kapalı pist önerilir.";
                resType = "warning";
            }
            // 2. (N) ^ (O) ^ (R v S) -> ERR
            else if (d === "DN" && r === "RO" && (t === "TR" || t === "TS")) {
                resTitle = "Vehicle Mismatch Error";
                resDesc = "Görsel Mantığı: Racing (R) veya Scooter (S) tipi araçlar Off-road (O) için uygun değildir.";
                resType = "error";
            }
            // 3. (N) ^ (H) ^ (A) ^ (3) ^ (R) -> KEH
            else if (d === "DN" && r === "RH" && s === "SA" && c === "C3" && t === "TR") {
                resTitle = "Kuzey Ege Highway";
                resDesc = "Görsel Mantığı: Yüksek güç (3), agresif stil (A) ve otoban (H) birleşimi.";
            }
            // 4. (N) ^ (H) ^ (W) ^ (T) -> EMN
            else if (d === "DN" && r === "RH" && s === "SC" && t === "TT") {
                resTitle = "Efes - Meryem Ana Route";
                resDesc = "Görsel Mantığı: Otoban (H) ve Touring (T) ile keyifli (W) uzun sürüş.";
            }
            // 5. (N) ^ (C) ^ (W) ^ (2) ^ (T) -> IFR
            else if (d === "DN" && r === "RC" && s === "SC" && c === "C2" && t === "TT") {
                resTitle = "İzmir - Foça Route";
                resDesc = "Görsel Mantığı: Virajlı yollar (C), orta hacimli motor (2) ve Touring (T) seçimi.";
            }
            // 6. (N) ^ (H) ^ (W) ^ (2) ^ (R) -> FCH
            else if (d === "DN" && r === "RH" && s === "SC" && c === "C2" && t === "TR") {
                resTitle = "Foça Highway Connection";
                resDesc = "Görsel Mantığı: Otoban (H) ve Racing (R) ile orta hacimli (2) ulaşım rotası.";
            }
            // 7. (N) ^ (V) ^ (G) ^ (3) ^ (T v R) -> KG
            else if (d === "DN" && r === "RS" && s === "SW" && c === "C3" && (t === "TT" || t === "TR")) {
                resTitle = "Kordon to Güzelbahçe Road";
                resDesc = "Görsel Mantığı: Manzaralı yol (V), uzun yol stili (G) ve yüksek kapasiteli (3) araçlar.";
            }
            // 8. (N) ^ (V) ^ (K) ^ (1) ^ (S) -> ICF
            else if (d === "DN" && r === "RS" && s === "SV" && c === "C1" && t === "TS") {
                resTitle = "İnciraltı City Forest";
                resDesc = "Görsel Mantığı: Manzara (V), gezi stili (K), düşük hacim (1) ve Scooter (S).";
            }
            // 9. (N) ^ (V) ^ (G) ^ (1) ^ (S) -> SAS
            else if (d === "DN" && r === "RS" && s === "SW" && c === "C1" && t === "TS") {
                resTitle = "Sasalı Bird Paradise";
                resDesc = "Görsel Mantığı: Manzara (V), uzun yol stili (G), düşük hacimli (1) Scooter.";
            }
            // 10. (N) ^ (V) ^ (G) ^ (2) ^ (T) -> SIG
            else if (d === "DN" && r === "RS" && s === "SW" && c === "C2" && t === "TT") {
                resTitle = "Sığacık - Seferihisar Route";
                resDesc = "Görsel Mantığı: Manzara (V), uzun yol (G) ve Touring (T) konforu.";
            }
            // 11. (N) ^ (C) ^ (A) ^ (3) ^ (R) -> KBB
            else if (d === "DN" && r === "RC" && s === "SA" && c === "C3" && t === "TR") {
                resTitle = "Karaburun Bends";
                resDesc = "Görsel Mantığı: Viraj (C), agresif stil (A), yüksek güç (3) ve Racing (R).";
            }
            // 12. (N) ^ (V) ^ (G) ^ (1) ^ (S) -> VAR
            else if (d === "DN" && r === "RS" && s === "SW" && c === "C1" && t === "TS") {
                resTitle = "Varyant - Konak Curves";
                resDesc = "Görsel Mantığı: Manzara (V), uzun yol stili (G) ve şehir içi Scooter (S).";
            }
            // 13. (N) ^ (V) ^ (K) ^ (1) ^ (T) -> YCV
            else if (d === "DN" && r === "RS" && s === "SV" && c === "C1" && t === "TT") {
                resTitle = "Yaka Köy - Çiçekli Forest Road";
                resDesc = "Görsel Mantığı: Manzara (V), gezi stili (K) ve Touring (T) uyumu.";
            }
            // 14. (N) ^ (C) ^ (K) ^ (2) ^ (E) -> SKP
            else if (d === "DN" && r === "RC" && s === "SV" && c === "C2" && t === "TE") {
                resTitle = "Sabuncubeli Pass";
                resDesc = "Görsel Mantığı: Virajlı yol (C), gezi stili (K) ve Enduro (E) dengesi.";
            }
            // 15. (N) ^ (O) ^ (A) ^ (3) ^ (E) -> HVF
            else if (d === "DN" && r === "RO" && s === "SA" && c === "C3" && t === "TE") {
                resTitle = "Homeros Valley - Dirt Paths";
                resDesc = "Görsel Mantığı: Off-road (O), agresif enduro stili (A) ve yüksek güç (3).";
            }
            // ELSE -> DEF
            else {
                resTitle = "İzmir Coastal Explorer";
                resDesc = "Belirlenmiş ana matris dışındaki seçimler için önerilen dengeli şehir içi rotası.";
            }

            // UI Display
            title.innerText = resTitle;
            desc.innerText = resDesc;
            
            container.classList.remove('hidden');
            container.classList.add('result-fade-in');

            if (resType === "error") {
                box.className = "p-6 rounded-2xl border-l-4 bg-red-900/50 border-red-500 text-red-50 shadow-2xl";
            } else if (resType === "warning") {
                box.className = "p-6 rounded-2xl border-l-4 bg-amber-900/50 border-amber-500 text-amber-50 shadow-2xl";
            } else {
                box.className = "p-6 rounded-2xl border-l-4 bg-emerald-900/50 border-emerald-500 text-emerald-50 shadow-2xl";
            }

            setTimeout(() => container.classList.remove('result-fade-in'), 600);
        }
    </script>
</body>
</html>
