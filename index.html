<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmir MotoRoute - Visual Planner</title>
    <style>
        :root {
            --primary: #f39c12;
            --overlay: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Arka Plan: İzmir Saat Kulesi / Genel Manzara */
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('https://images.pexels.com/photos/15206533/pexels-photo-15206533.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .app-container {
            background: rgba(30, 30, 30, 0.9);
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid var(--primary);
            backdrop-filter: blur(5px);
        }

        h1 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full { grid-column: span 2; }
        
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
        select { width: 100%; padding: 10px; border-radius: 5px; background: #222; color: white; border: 1px solid #444; }

        button {
            width: 100%; padding: 15px; margin-top: 25px;
            background: var(--primary); color: black; border: none;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #e67e22; transform: translateY(-2px); }

        /* Rota Sonuç Kutusu */
        #result-box {
            margin-top: 30px; padding: 20px; border-radius: 15px;
            background: #111; display: none; text-align: center;
            border: 1px solid #333;
        }

        #route-image {
            width: 100%; height: 250px; object-fit: cover;
            border-radius: 10px; margin-bottom: 15px;
            border: 2px solid var(--primary);
            background-color: #222; /* Resim yüklenene kadar koyu arka plan */
        }

        .route-title { color: var(--primary); font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .route-desc { color: #ccc; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>MotoRoute İzmir</h1>
    
    <div class="grid-inputs">
        <div class="full">
            <label>Missing Documents?</label>
            <select id="docs">
                <option value="no">No, ready to go</option>
                <option value="yes">Yes, missing documents</option>
            </select>
        </div>
        <div>
            <label>Motorcycle Type</label>
            <select id="type">
                <option value="Racing">Racing</option>
                <option value="Naked">Naked</option>
                <option value="Enduro">Enduro</option>
                <option value="Touring">Touring</option>
                <option value="Scooter">Scooter</option>
            </select>
        </div>
        <div>
            <label>Riding Style</label>
            <select id="style">
                <option value="Aggresive">Aggressive</option>
                <option value="Chill">Chill</option>
                <option value="Sightseeing">Sightseeing</option>
                <option value="Long way">Long way</option>
            </select>
        </div>
        <div>
            <label>Engine CC</label>
            <select id="cc">
                <option value="0-250cc">0-250cc</option>
                <option value="251-599cc">251-599cc</option>
                <option value="600+">600cc+</option>
            </select>
        </div>
        <div>
            <label>Road Type</label>
            <select id="road">
                <option value="Highway">Highway</option>
                <option value="Off-road">Off-road</option>
                <option value="Curvy">Curvy</option>
                <option value="View">View</option>
            </select>
        </div>
    </div>

    <button onclick="getRoute()">FIND MY ROUTE</button>

    <div id="result-box">
        <img id="route-image" src="" alt="Route Recommendation">
        <div id="route-title" class="route-title"></div>
        <p id="route-description" class="route-desc"></p>
    </div>
</div>

<script>
    function getRoute() {
        const docs = document.getElementById('docs').value;
        const type = document.getElementById('type').value;
        const road = document.getElementById('road').value;
        const cc = document.getElementById('cc').value;
        const style = document.getElementById('style').value;

        const box = document.getElementById('result-box');
        const img = document.getElementById('route-image');
        const title = document.getElementById('route-title');
        const desc = document.getElementById('route-description');

        let rName, rDesc, rImg;

        // --- MANTIK VE GÖRSEL ATAMA ---
        if (docs === 'yes') {
            rName = "Ülkü Race Track (Pınarbaşı)";
            rDesc = "Safety First! Since you have missing documents, stay on the professional track in Pınarbaşı.";
            rImg = "https://images.pexels.com/photos/163789/race-car-race-track-speedway-auto-racing-163789.jpeg"; 
        } 
        else if (road === 'Highway' && cc === '600+') {
            rName = "Kuzey Ege Highway";
            rDesc = "The perfect spot for high-speed cruising and smooth asphalt.";
            rImg = "https://images.pexels.com/photos/2583471/pexels-photo-2583471.jpeg";
        }
        else if (road === 'Off-road' || type === 'Enduro') {
            rName = "Balçova Therapy Forest / Homeros Valley";
            rDesc = "Dusty trails and nature's challenge await your adventure bike.";
            rImg = "https://images.pexels.com/photos/1038935/pexels-photo-1038935.jpeg";
        }
        else if (road === 'Curvy' && (type === 'Racing' || type === 'Naked')) {
            rName = "Karaburun Curvy Road / Sabuncubeli";
            rDesc = "Lean into those corners! Technical turns and amazing views.";
            rImg = "https://images.pexels.com/photos/1546901/pexels-photo-1546901.jpeg";
        }
        else if (type === 'Scooter' || style === 'Chill') {
            rName = "İnciraltı & Kordon Coastline";
            rDesc = "A relaxed city ride. Sea breeze and coffee stops all the way.";
            rImg = "https://images.pexels.com/photos/3405001/pexels-photo-3405001.jpeg";
        }
        else {
            rName = "İzmir Bay Loop (Güzelyalı - Bostanlı)";
            rDesc = "A classic tour around the Gulf of İzmir. Perfect for every rider.";
            rImg = "https://images.pexels.com/photos/15206533/pexels-photo-15206533.jpeg";
        }

        // DOM Güncelleme
        title.innerText = rName;
        desc.innerText = rDesc;
        img.src = rImg;
        box.style.display = "block";
    }
</script>

</body>
</html>
