<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmir MotoRoute Planner</title>
    <style>
        :root {
            --primary: #f39c12;
            --bg-overlay: rgba(0, 0, 0, 0.75);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            /* Arka plana İzmir genel manzara ekledik */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1590716202497-158869c9b98d?q=80&w=1600') no-repeat center center fixed;
            background-size: cover;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .app-container {
            background: rgba(26, 26, 26, 0.9);
            max-width: 650px;
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); /* Arka planı hafif bulanıklaştırır, daha şık durur */
            border: 1px solid rgba(243, 156, 18, 0.3);
        }

        h1 { color: var(--primary); text-align: center; text-transform: uppercase; margin-bottom: 30px; }

        .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #333; color: white; border: 1px solid #444; }

        button {
            width: 100%; padding: 15px; margin-top: 30px;
            background: var(--primary); color: black; border: none;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* Önerilen Rota Kutusu */
        #result-box {
            margin-top: 30px; padding: 20px; border-radius: 10px;
            background: rgba(45, 45, 45, 0.9); display: none; text-align: center;
        }

        #route-image {
            width: 100%; height: 250px; object-fit: cover;
            border-radius: 10px; margin-bottom: 15px;
            border: 2px solid var(--primary);
        }

        .route-title { color: var(--primary); font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .route-desc { color: #ddd; line-height: 1.5; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>MotoRoute İzmir</h1>
    
    <div class="input-section">
        <div class="input-group full-width">
            <label>Missing Documents?</label>
            <select id="docs"><option value="no">No</option><option value="yes">Yes</option></select>
        </div>
        <div class="input-group">
            <label>Motorcycle Type</label>
            <select id="type"><option value="Racing">Racing</option><option value="Naked">Naked</option><option value="Enduro">Enduro</option><option value="Touring">Touring</option><option value="Scooter">Scooter</option></select>
        </div>
        <div class="input-group">
            <label>Riding Style</label>
            <select id="style"><option value="Aggresive">Aggressive</option><option value="Chill">Chill</option><option value="Sightseeing">Sightseeing</option><option value="Long way">Long way</option></select>
        </div>
        <div class="input-group">
            <label>Engine CC</label>
            <select id="cc"><option value="0-250cc">0-250cc</option><option value="251-599cc">251-599cc</option><option value="600+">600cc+</option></select>
        </div>
        <div class="input-group">
            <label>Preferred Road</label>
            <select id="road"><option value="Highway">Highway</option><option value="Off-road">Off-road</option><option value="Curvy">Curvy</option><option value="View">View</option></select>
        </div>
    </div>

    <button onclick="calculateRoute()">Generate Route</button>

    <div id="result-box">
        <img id="route-image" src="" alt="Route Image">
        <div id="route-title" class="route-title"></div>
        <p id="route-description" class="route-desc"></p>
    </div>
</div>

<script>
    function calculateRoute() {
        const docs = document.getElementById('docs').value;
        const type = document.getElementById('type').value;
        const style = document.getElementById('style').value;
        const cc = document.getElementById('cc').value;
        const road = document.getElementById('road').value;
        
        const box = document.getElementById('result-box');
        const img = document.getElementById('route-image');
        const title = document.getElementById('route-title');
        const desc = document.getElementById('route-description');

        let resultName = "";
        let resultDesc = "";
        let resultImg = "";

        // --- MANTIK VE RESİM EŞLEŞTİRMESİ ---
        if (docs === 'yes') {
            resultName = "Ülkü Race Track (Pınarbaşı)";
            resultDesc = "Legal and safe track for riders with missing documents.";
            resultImg = "https://images.unsplash.com/photo-1541890289-b86df5bafd81?q=80&w=800"; // Temsili pist
        } 
        else if (road === 'Highway' && cc === '600+') {
            resultName = "Kuzey Ege Highway";
            resultDesc = "Fast, wide and smooth asphalt for high performance.";
            resultImg = "https://images.unsplash.com/photo-1515003118228-5645604473b1?q=80&w=800"; // Temsili otoban
        }
        else if (type === 'Enduro' && road === 'Off-road') {
            resultName = "Balçova Therapy Forest";
            resultDesc = "The best off-road trails inside İzmir.";
            resultImg = "https://images.unsplash.com/photo-1542137722061-efd1cbdf156c?q=80&w=800"; // Temsili orman yolu
        }
        else if (road === 'Curvy' && road === 'View') {
            resultName = "Karaburun Curvy Road";
            resultDesc = "Legendary seaside curves with amazing views.";
            resultImg = "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=800"; // Temsili sahil yolu
        }
        else if (type === 'Scooter' && style === 'Chill') {
            resultName = "İnciraltı Coastline";
            resultDesc = "Relaxed sea breeze and easy riding.";
            resultImg = "https://images.unsplash.com/photo-1519451241324-20b4ea2c4220?q=80&w=800"; // Temsili deniz kenarı
        }
        else {
            resultName = "İzmir Bay Loop";
            resultDesc = "A general tour around the beautiful gulf of İzmir.";
            resultImg = "https://images.unsplash.com/photo-1560060141-72901682a839?q=80&w=800"; // Temsili İzmir manzarası
        }

        // Sonuçları ekrana bas
        title.innerText = resultName;
        desc.innerText = resultDesc;
        img.src = resultImg;
        box.style.display = "block";
    }
</script>

</body>
</html>
