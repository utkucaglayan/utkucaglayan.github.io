<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir MotoRoute Planner</title>
    <!-- Tailwind CSS: Modern ve hızlı arayüz tasarımı için kullanıldı -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
        }

        /* Sabit Arka Plan Görseli: İzmir Genel Görünümü */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.85)), 
                              url('https://www.eglengez.com/wp-content/uploads/2024/09/Izmirde-Gezilecek-Yerler-e1726472587489.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Cam Efekti (Glassmorphism) Kart Tasarımı */
        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .moto-accent {
            color: #f59e0b; /* Amber 500 rengi */
        }

        /* Ana Buton Stilleri */
        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4);
        }

        /* Sonuç ekranı giriş animasyonu */
        .result-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        select option {
            background-color: #1e293b;
            color: white;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-overlay"></div>

    <div class="glass-card max-w-md w-full rounded-3xl p-8 shadow-2xl my-8 border border-white/5 text-slate-100">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight uppercase">
                MotoRoute <span class="moto-accent">İZMİR</span>
            </h1>
            <p class="text-slate-300 text-sm mt-2 font-medium tracking-wide">Find your perfect riding route in İzmir</p>
        </header>

        <div class="space-y-5">
            <!-- Documents (D) - Yasal Durum Sorgusu -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">1. Documents Missing?</label>
                <select id="D" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="DN">No</option>
                    <option value="DY">Yes</option>
                </select>
            </div>

            <!-- Bike Type (T) - Motor Tipi -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">2. Motorcycle Type</label>
                <select id="T" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="TR">Racing</option>
                    <option value="TT">Touring</option>
                    <option value="TS">Scooter</option>
                    <option value="TE">Enduro</option>
                </select>
            </div>

            <!-- Style (S) - Sürüş Tarzı -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">3. Riding Style</label>
                <select id="S" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="SA">Aggressive</option>
                    <option value="SK">Chill</option>
                    <option value="SG">Sightseeing</option>
                    <option value="SW">Long Way</option>
                </select>
            </div>

            <!-- Engine CC (C) - Motor Hacmi -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">4. Engine Capacity</label>
                <select id="C" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="C1">0 - 250cc</option>
                    <option value="C2">251 - 599cc</option>
                    <option value="C3">600cc and above</option>
                </select>
            </div>

            <!-- Road Type (R) - Yol Ortamı -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">5. Road Environment</label>
                <select id="R" class="w-full bg-slate-900/60 border border-slate-700 text-white rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="RH">Highway</option>
                    <option value="RO">Off-road</option>
                    <option value="RC">Curvy</option>
                    <option value="RS">Scenic View</option>
                </select>
            </div>

            <button onclick="calculateRoute()" class="btn-primary w-full py-4 rounded-xl text-slate-900 font-extrabold text-sm uppercase tracking-widest mt-4 shadow-xl active:scale-95 transition-transform">
                Generate Recommendation
            </button>
        </div>

        <!-- Sonuç Bölümü -->
        <div id="result-container" class="mt-8 hidden">
            <div id="result-box" class="p-6 rounded-2xl border-l-4 overflow-hidden">
                <div class="flex flex-col gap-4">
                    <!-- Rota Görseli (Daha büyük boyuta ayarlandı: h-64) -->
                    <div id="result-img-container" class="w-full h-64 rounded-xl overflow-hidden shadow-lg border border-white/10 hidden">
                        <img id="result-img" src="" alt="Destination" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h3 id="result-title" class="text-xl font-extrabold mb-1"></h3>
                        <p id="result-desc" class="text-sm opacity-95 mb-4 leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * İzmir MotoRoute Planner Karar Mantığı
         */
        function calculateRoute() {
            const d = document.getElementById('D').value; 
            const t = document.getElementById('T').value; 
            const s = document.getElementById('S').value; 
            const c = document.getElementById('C').value; 
            const r = document.getElementById('R').value; 

            const container = document.getElementById('result-container');
            const box = document.getElementById('result-box');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            const resultImg = document.getElementById('result-img');
            const resultImgContainer = document.getElementById('result-img-container');

            let resTitle = "";
            let resDesc = "";
            let resType = "success"; 

            // Rota Başlıkları ve Görsel URL'leri Eşleşmesi
            const destinationImages = {
                "Ülkü Park Race Track": "https://www.gundemcesme.com/haber_resim/Ulku-Park-Pistinde-Nefes-Kesen-Mucadele--107691.jpg",
                "Kuzey Ege Highway": "https://kalyonholding.com/images/yatirim-isletme.webp",
                "Efes Meryem Ana": "https://habereksprescomtr.teimg.com/haberekspres-com-tr/uploads/2024/04/image-208db99d0a1ead25aaf46f55d8006df4a5001a1e.png",
                "İzmir Foça Route": "https://trthaberstatic.cdn.wp.trt.com.tr/resimler/2236000/foca-izmir-a-2237981.jpg",
                "Foça Highway Connection": "https://egetelgrafcom.teimg.com/crop/1280x720/egetelgraf-com/wp/uploads/2020/08/foca-tuzmine-otoyol-dopingi.jpg",
                "Kordon to Güzelbahçe": "https://egetelgrafcom.teimg.com/egetelgraf-com/uploads/2025/08/4-307.jpg",
                "Inciralti City Forest": "https://avatars.mds.yandex.net/get-searchnews-images/13860241/2a0000019786d8214d022e59956baa0c1ac1/orig",
                "Sasalı Bird Paradise": "https://www.sinasiyuksel.com/blog/wp-content/gallery/kus-cenneti-2017/IMG_6631.JPG",
                "Sığacık Seferihisar": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/S%C4%B1%C4%9Fac%C4%B1k_02.jpg/960px-S%C4%B1%C4%9Fac%C4%B1k_02.jpg",
                "Karaburun Bends": "https://cdn.villacim.com.tr/uploads/3840/294_izmirkaraburungezilecekyerler.jpg",
                "Varyant Konak": "https://izgazetenet.teimg.com/izgazete-net/uploads/2025/04/birlesmis-milletler-caddesi-varyant-3.jpg",
                "Yaka Köy Çiçekli": "https://izgazetenet.teimg.com/izgazete-net/uploads/2024/12/koy-iz-kapak.jpg",
                "Sabuncubeli Pass": "https://manisahaberlericom.teimg.com/manisahaberleri-com/images/upload/AW414348_07.jpg",
                "Homeros Valley": "https://1.bp.blogspot.com/-FUoCADHP1f0/VpBNHCCh_oI/AAAAAAAACD4/4AU_itGFwK4/s1600/Homeros-Vadisi.jpg",
                "İzmir Coastal Highway": "https://egetelgrafcom.teimg.com/egetelgraf-com/uploads/2025/03/selway-outlet-avm.webp"
            };

            // --- MANTIKSAL KARAR MATRİSİ ---
            if (d === "DY") {
                resTitle = "Ülkü Park Race Track";
                resDesc = "Documents missing. Public roads are restricted. We suggest the professional closed circuit at Ülkü Park in Pınarbaşı for legal safety.";
                resType = "warning";
            }
            else if (d === "DN" && r === "RO" && (t === "TR" || t === "TS")) {
                resTitle = "Mismatch Error";
                resDesc = "Racing bikes and Scooters are not physically equipped for mountain trails or loose dirt. Please choose a suitable terrain.";
                resType = "error";
            }
            else if (d === "DN" && r === "RH" && s === "SA" && c === "C3" && t === "TR") {
                resTitle = "Kuzey Ege Highway";
                resDesc = "Optimized for high-speed stability and wide asphalt lanes. Best for aggressive power delivery on high-capacity engines.";
            }
            else if (d === "DN" && r === "RH" && s === "SW" && t === "TT") {
                resTitle = "Efes Meryem Ana";
                resDesc = "A premium long-distance tour combining highway comfort with iconic technical bends up to the historic site.";
            }
            else if (d === "DN" && r === "RH" && s === "SW" && c === "C2" && t === "TR") {
                resTitle = "Foça Highway Connection";
                resDesc = "Specifically selected safe highway links for steady cruising on mid-capacity engines heading north.";
            }
            else if (d === "DN" && r === "RC" && t === "TR" && s === "SA") {
                resTitle = "Karaburun Bends";
                resDesc = "Technical, sharp turns that demand high concentration. The gold standard for precision cornering on sportbikes.";
            }
            else if (d === "DN" && r === "RC" && t === "TE" && s === "SK") {
                resTitle = "Sabuncubeli Pass";
                resDesc = "The classic mountain pass connecting İzmir and Manisa. Features rhythmic curves and significant elevation changes.";
            }
            else if (d === "DN" && r === "RC" && t === "TT" && s === "SW" && c === "C2") {
                resTitle = "İzmir Foça Route";
                resDesc = "A beautiful winding journey through coastal roads. Ideal for mid-size engines seeking a long-way experience.";
            }
            else if (d === "DN" && r === "RS" && c === "C3") {
                resTitle = "Kordon to Güzelbahçe";
                resDesc = "A relaxing coastal cruise along the Gulf. Best for high-capacity bikes to enjoy the city skyline and open sea breeze.";
            }
            else if (d === "DN" && r === "RS" && c === "C2") {
                resTitle = "Sığacık Seferihisar";
                resDesc = "Scenic beauty meets touring comfort. A beautiful ride leading to the historic Cittaslow harbor.";
            }
            else if (d === "DN" && r === "RS" && c === "C1" && s === "SK" && t === "TS") {
                resTitle = "Inciralti City Forest";
                resDesc = "The ideal scooter escape within the city. Quiet forest paths and green surroundings near the shoreline.";
            }
            else if (d === "DN" && r === "RS" && c === "C1" && s === "SK" && t === "TT") {
                resTitle = "Yaka Köy Çiçekli";
                resDesc = "A serene gezi route through forest villages. Great for low-speed cruising in a green environment.";
            }
            else if (d === "DN" && r === "RS" && c === "C1" && s === "SG" && t === "TS") {
                resTitle = "Varyant Konak";
                resDesc = "Iconic curves overlooking the city's historical heart. Short but scenic sightseeing on a scooter.";
            }
            else if (d === "DN" && r === "RS" && c === "C1" && s === "SG") {
                resTitle = "Sasalı Bird Paradise";
                resDesc = "A flat and peaceful route through the wildlife sanctuary. Perfect for low-capacity bikes and nature lovers.";
            }
            else if (d === "DN" && r === "RO" && t === "TE") {
                resTitle = "Homeros Valley";
                resDesc = "True adventure terrain. Mountain trails and unpaved paths designed for dual-sport capabilities.";
            }
            else {
                resTitle = "İzmir Coastal Highway";
                resDesc = "A general purpose route through the bay area, balanced for your current riding profile.";
            }

            // UI Güncelleme
            title.innerText = resTitle;
            desc.innerText = resDesc;

            // Görseli Göster ve Güncelle
            const imgUrl = destinationImages[resTitle];
            if (imgUrl) {
                resultImg.src = imgUrl;
                resultImgContainer.classList.remove('hidden');
            } else {
                resultImgContainer.classList.add('hidden');
            }
            
            container.classList.remove('hidden');
            container.classList.add('result-fade-in');

            // Sonuç tipine göre renk stilini uygula
            if (resType === "error") {
                box.className = "p-6 rounded-2xl border-l-4 bg-red-900/50 border-red-500 text-red-50 shadow-2xl";
            } else if (resType === "warning") {
                box.className = "p-6 rounded-2xl border-l-4 bg-amber-900/50 border-amber-500 text-amber-50 shadow-2xl";
            } else {
                box.className = "p-6 rounded-2xl border-l-4 bg-emerald-900/50 border-emerald-500 text-emerald-100 shadow-2xl";
            }

            setTimeout(() => container.classList.remove('result-fade-in'), 600);
        }
    </script>
</body>
</html>
